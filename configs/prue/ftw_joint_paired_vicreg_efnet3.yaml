trainer:
  max_epochs: 100
  log_every_n_steps: 10
  accelerator: gpu
  precision: bf16-mixed
  default_root_dir: logs/prue/ftw_joint-paired-vicreg-unet-efnet3-crop512-v3-augmax-full
  devices: [0]
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      entity: isaaccorley
      project: ftw-planet
      name: joint-paired-vicreg-efnet3-crop512-v3-augmax-full
      save_dir: logs/prue/ftw_joint-paired-vicreg-unet-efnet3-crop512-v3-augmax-full
      log_model: false
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: val/loss
        mode: min
        save_top_k: 1
        save_last: true
        filename: "{epoch}-{val/loss:.2f}"
# VICReg joint training: paired Planet(3m) + S2(10m) batches.
# Both branches share the UNet encoder. S2 upsampled 256→512 (bilinear).
# Loss = seg(planet) + seg(s2) + vicreg_weight * VICReg(z_pl, z_s2).
# vicreg_weight=1.0 keeps VICReg roughly same magnitude as combined seg losses.
model:
  class_path: ftw_planet.trainers.FTWPairedSegTask
  init_args:
    class_weights: [0.05, 0.2, 0.75]
    loss: "logcoshdice"
    model: "unet"
    backbone: "efficientnet-b3"
    weights: true
    patch_weights: false
    in_channels: 8
    num_classes: 3
    num_filters: 64
    ignore_index: 3
    lr: 1e-3
    patience: 100
    vicreg_weight: 1.0
    vicreg_lambda: 25.0
    vicreg_mu: 25.0
    vicreg_nu: 1.0
    grad_checkpointing: false
data:
  class_path: ftw_planet.datamodules.FTWPairedDataModule
  init_args:
    batch_size: 64
    num_workers: 20
    crop_size: 512         # Planet crop + S2 upsample target
    s2_crop_size: 256      # S2 native crop before upsample
    load_boundaries: true
    usable_only: true
    preprocess_aug: true
    resize_aug: true
    swap_order: true
    per_band_gamma_aug: true
    per_band_affine_aug: true
    gaussian_blur_aug: true
    gaussian_noise_aug: true
    single_window_dropout_p: 0.15
    small_angle_rotation_aug: true
    shear_aug: true
    boundary_jitter_aug: true
    s2_train_countries: [austria, belgium, brazil, cambodia, corsica, croatia, denmark, estonia, finland, france, germany, india, kenya, latvia, lithuania, luxembourg, netherlands, portugal, rwanda, slovakia, slovenia, south_africa, spain, sweden, vietnam]
    train_countries: [austria, belgium, brazil, cambodia, corsica, croatia, denmark, estonia, finland, france, germany, india, kenya, latvia, lithuania, luxembourg, netherlands, portugal, rwanda, slovakia, slovenia, south_africa, spain, sweden, vietnam]
    val_countries: [austria]
    test_countries: [austria, belgium, brazil, cambodia, corsica, croatia, denmark, estonia, finland, france, germany, india, kenya, latvia, lithuania, luxembourg, netherlands, portugal, rwanda, slovakia, slovenia, south_africa, spain, sweden, vietnam]
  dict_kwargs:
    root: data
    s2_root: data/ftw
seed_everything: 7
