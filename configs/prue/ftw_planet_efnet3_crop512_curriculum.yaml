trainer:
  max_epochs: 100
  log_every_n_steps: 10
  accelerator: gpu
  precision: bf16-mixed
  default_root_dir: logs/prue/ftw_planet-unet-efnet3-crop512-curriculum
  devices:
    - 0
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      entity: isaaccorley
      project: ftw-planet
      name: prue-efnet3-crop512-curriculum
      save_dir: logs/prue/ftw_planet-unet-efnet3-crop512-curriculum
      log_model: false
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: val/loss
        mode: min
        save_top_k: 1
        save_last: true
        filename: "{epoch}-{val/loss:.2f}"
model:
  class_path: ftw_planet.trainers.FTWPlanetSegTask
  init_args:
    class_weights: [0.03, 0.17, 0.80]
    loss: "logcoshdice"
    model: "unet"
    backbone: "efficientnet-b3"
    weights: true
    patch_weights: false
    in_channels: 8
    num_classes: 3
    num_filters: 64
    ignore_index: 3
    lr: 1e-3
    patience: 100
data:
  class_path: ftw_planet.datamodules.FTWPlanetDataModule
  init_args:
    batch_size: 32
    num_workers: 20
    crop_size: 512
    load_boundaries: true
    usable_only: true
    # Easy -> hard: start with a 3-px boundary band, anneal to the true
    # 1-px line over the cosine schedule. Val / test always use the
    # un-dilated boundary so metrics stay comparable.
    boundary_dilate_schedule:
      0: 3
      30: 2
      60: 1
      80: 0
    train_countries:
      - austria
      - belgium
      - brazil
      - cambodia
      - corsica
      - croatia
      - denmark
      - estonia
      - finland
      - france
      - germany
      - india
      - kenya
      - latvia
      - lithuania
      - luxembourg
      - netherlands
      - portugal
      - rwanda
      - slovakia
      - slovenia
      - south_africa
      - spain
      - sweden
      - vietnam
    val_countries:
      - austria
    test_countries:
      - austria
      - belgium
      - brazil
      - cambodia
      - corsica
      - croatia
      - denmark
      - estonia
      - finland
      - france
      - germany
      - india
      - kenya
      - latvia
      - lithuania
      - luxembourg
      - netherlands
      - portugal
      - rwanda
      - slovakia
      - slovenia
      - south_africa
      - spain
      - sweden
      - vietnam
  dict_kwargs:
    root: data
seed_everything: 7
